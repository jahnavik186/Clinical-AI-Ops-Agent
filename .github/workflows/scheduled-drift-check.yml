name: Scheduled Drift Check

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      endpoint:
        description: SageMaker endpoint to check (leave blank for all)
        required: false
        default: ""

jobs:
  drift-check:
    name: Trigger Drift Detection Agent
    runs-on: ubuntu-latest

    steps:
      - name: Check AWS schedule secrets
        id: aws_secrets
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AWS schedule secrets not configured. Skipping scheduled drift check."
          fi

      - name: Configure AWS credentials
        if: steps.aws_secrets.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Invoke agent Lambda
        if: steps.aws_secrets.outputs.configured == 'true'
        run: |
          ENDPOINT="${{ github.event.inputs.endpoint }}"
          if [ -z "$ENDPOINT" ]; then
            PAYLOAD='{"triggered_by": "github_schedule"}'
          else
            PAYLOAD="{\"endpoints\": [\"$ENDPOINT\"], \"triggered_by\": \"manual_dispatch\"}"
          fi

          echo "Payload: $PAYLOAD"

          aws lambda invoke \
            --function-name clinical-ai-ops-agent-prod \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            response.json

          cat response.json

      - name: Check for agent errors
        if: steps.aws_secrets.outputs.configured == 'true'
        run: |
          python3 -c "
          import json, sys
          r = json.load(open('response.json'))
          body = json.loads(r.get('body', '{}'))
          errors = [k for k, v in body.items() if v.get('status') == 'error']
          if errors:
              print(f'Agent errors for endpoints: {errors}')
              sys.exit(1)
          print('All endpoints checked successfully')
          "

      - name: Skip scheduled drift check when AWS secrets are unavailable
        if: steps.aws_secrets.outputs.configured != 'true'
        run: echo "Skipping scheduled drift check because AWS repository secrets are not configured."
